<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 250px; font-family: Arial, sans-serif; padding: 15px; }
        h3 { color: #006aff; margin-top: 0; }
        .btn-reset { width: 100%; padding: 10px; background-color: #ff4d4d; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-reset:hover { background-color: #cc0000; }
        .status { margin-top: 10px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <h3>Zendesk Timer v1.0</h3>
    <p>Monitor de Inatividade de Clientes (5 minutos).</p>
    <button id="clear-all" class="btn-reset">Zerar Todos os Monitores</button>
    <div class="status">Versão estável (Base v1.0)</div>
    <script src="popup.js"></script>
</body>
</html>
